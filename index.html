<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <title>B&B Donuts</title>
    <style>
        .navbar {
            background: linear-gradient(90deg, #ff7eb3, #ff758c);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .jumbotron {
            background: #edc5e4;
        }
        body {
            background: #fff8f2;
            font-family: "Poppins", sans-serif;
        }
        .btn {
            background-color: #ff69b4; 
            border-color: #ff69b4; 
            color: #ffffff;
        }
        .divington {
            border: 1px dashed black;
        }
    </style>
  </head>
  <body>
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <a class="navbar-brand" href="index.html">B&B Donuts</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Home <span class="sr-only">(current)</span></a>
                <a class="nav-link" href="about.html">About Us</a>
                </div>
            </div>
        </nav>
        <div class="row">
            <div class="col-md-12">
                <div class="jumbotron jumbotron-fluid">
                    <div class="container">
                        <h1 class="display-4">Welcome to B&B Donuts!</h1>
                        <p class="lead">Fresh donuts for everyone, all day!</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-3 text-center">
                <div class="card" style="width: 18rem;">
                    <img src="media/glazed.jpg" class="card-img-top" alt="glazed">
                    <div class="card-body">
                        <h5 class="card-title">Glazed Donut</h5>
                        <p class="card-text">$1.50</p> 
                        <button class="btn mt-auto" onclick="addToCart('glazed', 1.50)">Add To Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="card" style="width: 18rem;">
                    <img src="strawberry.jpg" class="card-img-top" alt="Strawberry w/ Sprinkles">
                    <div class="card-body">
                        <h5 class="card-title">Strawberry Frosted</h5>
                        <p class="card-text">$1.75</p>
                        <button class="btn mt-auto" onclick="addToCart('strawberry', 1.75)">Add To Cart</button>
                    </div>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="card" style="width: 18rem;">
                    <img src="chocolate-glaze.jpg" class="card-img-top" alt="Chocolate Frosted">
                    <div class="card-body">
                        <h5 class="card-title">Chocolate Frosted</h5>
                        <p class="card-text">$1.75</p>
                        <button class="btn mt-auto" onclick="addToCart('chocolate', 1.75)">Add To Cart</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div class="divington">
                    <h2>Total:</h2><br>
                    <h3 id="total">Your total is $0</h3><br>
                    <h2>Items in Cart:</h2><br>
                    <ol id="cartList"></ol>
                    <br>
                    <button class="btn mt-auto mx-auto" onclick="checkout()">Checkout</button>
                    <br>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    <script>
      var donuts = [];
      function addToCart(name, price) { //function to add stuff to cart
        donuts.push({name: name, price: price});
        updateTotal();
        updateCartList();
      }
      function updateTotal() {
        var total = 0;
        for (let i = 0; i < donuts.length; i++) {
          total += donuts[i].price*1.115; //1.115 for sales tax
        }
        total = total.toFixed(2);
        if (total < 50) {
            document.getElementById("total").innerHTML = `Your total is $${total} (sales tax included)`;
        }
        else {
            total = total*0.9;
            total = total.toFixed(2);
            document.getElementById("total").innerHTML = `Your total is $${total} (10% discount for sale over $100)`;
        }
      }
      function updateCartList() {
        var listHTML = "";
        for (let x = 0; x < donuts.length; x++) {
            listHTML += "<li>" + donuts[x].name + "</li>";
        }
        document.getElementById("cartList").innerHTML = listHTML;
      }
      function checkout() {
        donuts = [];
        document.getElementById("total").innerHTML = "Your total is $0";
        document.getElementById("cartList").innerHTML = "";
      }
    </script>
  </body>
</html>
